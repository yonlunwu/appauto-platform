# mypy configuration for llm-perf-platform
[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
strict_optional = True
ignore_missing_imports = True
explicit_package_bases = True

# Ignore these paths
[mypy-tests.*]
ignore_errors = True

[mypy-*.tests.*]
ignore_errors = True

[mypy-setuptools.*]
ignore_missing_imports = True

[mypy-pkg_resources.*]
ignore_missing_imports = True

[mypy-appauto.*]
ignore_missing_imports = True
